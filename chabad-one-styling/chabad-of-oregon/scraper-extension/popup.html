<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 15px;
      color: #333;
    }
    .url-display {
      background: white;
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
      word-break: break-all;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      max-height: 40px;
      overflow: hidden;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6B2C3E 0%, #8B3A4E 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover {
      background: linear-gradient(135deg, #7D3550 0%, #9D4560 100%);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      font-size: 12px;
      color: #27ae60;
      margin-top: 8px;
    }
    .status.error {
      color: #c0392b;
    }
    .instructions {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }
    .count {
      background: #6B2C3E;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <h2>Event Image Capture</h2>
  <div class="url-display" id="url-display">Loading...</div>
  <button id="activate-btn">Start Selecting Images</button>
  <div class="status" id="status"></div>
  <div class="instructions" id="instructions"></div>

  <script src="popup.js"></script>
</body>
</html>
